<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMS — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<!-- Sidebar Navigation -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <span class="brand-icon"><i class="fas fa-graduation-cap"></i></span>
    <span class="brand-text">UniSMS</span>
  </div>
  <nav class="sidebar-nav">
    <a href="/" class="nav-link active"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="/students" class="nav-link"><i class="fas fa-users"></i> Students</a>
    <a href="/courses" class="nav-link"><i class="fas fa-book-open"></i> Courses</a>
    <a href="/grades" class="nav-link"><i class="fas fa-star"></i> Grades</a>
  </nav>
  <div class="sidebar-footer">
    <span class="uni-name">PMAS Arid Agriculture University</span>
  </div>
</div>

<!-- Main Content -->
<div class="main-content">
  <!-- Top Bar -->
  <div class="topbar">
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <div class="topbar-title">Dashboard</div>
    <div class="topbar-right">
      <span class="semester-badge">Spring 2026</span>
      <span class="user-avatar"><i class="fas fa-user-circle"></i></span>
    </div>
  </div>

  <div class="page-body">
    <!-- Stats Cards -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card" style="--accent:#4ade80">
        <div class="stat-icon"><i class="fas fa-users"></i></div>
        <div class="stat-info">
          <span class="stat-value" id="totalStudents">—</span>
          <span class="stat-label">Total Students</span>
        </div>
      </div>
      <div class="stat-card" style="--accent:#60a5fa">
        <div class="stat-icon"><i class="fas fa-book-open"></i></div>
        <div class="stat-info">
          <span class="stat-value" id="totalCourses">—</span>
          <span class="stat-label">Courses Offered</span>
        </div>
      </div>
      <div class="stat-card" style="--accent:#f472b6">
        <div class="stat-icon"><i class="fas fa-star"></i></div>
        <div class="stat-info">
          <span class="stat-value" id="totalGrades">—</span>
          <span class="stat-label">Grade Records</span>
        </div>
      </div>
      <div class="stat-card" style="--accent:#fb923c">
        <div class="stat-icon"><i class="fas fa-trophy"></i></div>
        <div class="stat-info">
          <span class="stat-value" id="avgCgpa">—</span>
          <span class="stat-label">Average CGPA</span>
        </div>
      </div>
    </div>

    <div class="dashboard-grid">
      <!-- Top Students -->
      <div class="card-panel">
        <div class="panel-header">
          <h3><i class="fas fa-medal"></i> Top Students</h3>
        </div>
        <div class="panel-body">
          <table class="data-table" id="topStudentsTable">
            <thead>
              <tr><th>#</th><th>Name</th><th>Roll No</th><th>Dept</th><th>CGPA</th></tr>
            </thead>
            <tbody id="topStudentsBody">
              <tr><td colspan="5" class="text-center">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Recent Activity -->
      <div class="card-panel">
        <div class="panel-header">
          <h3><i class="fas fa-clock"></i> Recent Activity</h3>
        </div>
        <div class="panel-body" id="activityFeed">
          <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
      </div>

      <!-- Grade Distribution -->
      <div class="card-panel span-full">
        <div class="panel-header">
          <h3><i class="fas fa-chart-bar"></i> Grade Distribution</h3>
        </div>
        <div class="panel-body">
          <div class="grade-bars" id="gradeBars">
            <div class="loading-dots"><span></span><span></span><span></span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      const res = await fetch('/api/dashboard/stats');
      const { data } = await res.json();

      document.getElementById('totalStudents').textContent = data.totalStudents;
      document.getElementById('totalCourses').textContent  = data.totalCourses;
      document.getElementById('totalGrades').textContent   = data.totalGrades;
      document.getElementById('avgCgpa').textContent       = data.avgCgpa;

      // Top students
      const tbody = document.getElementById('topStudentsBody');
      tbody.innerHTML = data.topStudents.map((s, i) => `
        <tr>
          <td><span class="rank rank-${i+1}">${i+1}</span></td>
          <td><strong>${s.name}</strong></td>
          <td><code>${s.rollNo}</code></td>
          <td><span class="dept-chip">${s.department}</span></td>
          <td><span class="cgpa-badge">${s.cgpa}</span></td>
        </tr>
      `).join('');

      // Activity
      const feed = document.getElementById('activityFeed');
      feed.innerHTML = data.recentActivity.map(a => `
        <div class="activity-item">
          <span class="activity-dot type-${a.type}"></span>
          <div>
            <div class="activity-action">${a.action}</div>
            <div class="activity-time">${a.time}</div>
          </div>
        </div>
      `).join('');

      // Grade bars
      const bars = document.getElementById('gradeBars');
      const dist = data.gradeDistribution;
      const maxVal = Math.max(...Object.values(dist));
      const gradeColors = { A:'#4ade80','A-':'#86efac','B+':'#60a5fa','B':'#93c5fd','B-':'#c4b5fd','C+':'#fb923c','C':'#fcd34d','D':'#f87171','F':'#ef4444' };
      bars.innerHTML = Object.entries(dist).sort().map(([grade, count]) => `
        <div class="grade-bar-item">
          <div class="grade-label">${grade}</div>
          <div class="grade-bar-track">
            <div class="grade-bar-fill" style="width:${(count/maxVal*100)}%; background:${gradeColors[grade]||'#60a5fa'}"></div>
          </div>
          <div class="grade-count">${count}</div>
        </div>
      `).join('');

    } catch (e) {
      console.error('Dashboard load error:', e);
    }
  });
</script>
</body>
</html>
