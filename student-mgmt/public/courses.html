<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMS — Courses</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <span class="brand-icon"><i class="fas fa-graduation-cap"></i></span>
    <span class="brand-text">UniSMS</span>
  </div>
  <nav class="sidebar-nav">
    <a href="/" class="nav-link"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="/students" class="nav-link"><i class="fas fa-users"></i> Students</a>
    <a href="/courses" class="nav-link active"><i class="fas fa-book-open"></i> Courses</a>
    <a href="/grades" class="nav-link"><i class="fas fa-star"></i> Grades</a>
  </nav>
  <div class="sidebar-footer"><span class="uni-name">PMAS Arid Agriculture University</span></div>
</div>

<div class="main-content">
  <div class="topbar">
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <div class="topbar-title">Course Management</div>
    <div class="topbar-right">
      <button class="btn-primary" onclick="openModal('addCourseModal')">
        <i class="fas fa-plus"></i> Add Course
      </button>
    </div>
  </div>

  <div class="page-body">
    <div class="card-panel">
      <div class="panel-header">
        <h3><i class="fas fa-book-open"></i> All Courses <span id="courseCount" class="count-badge">0</span></h3>
      </div>
      <div class="panel-body">
        <div class="courses-grid" id="coursesGrid">
          <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Course Modal -->
<div class="modal-overlay" id="addCourseModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="coursesModalTitle">Add New Course</h3>
      <button class="modal-close" onclick="closeModal('addCourseModal')"><i class="fas fa-times"></i></button>
    </div>
    <form id="courseForm" onsubmit="submitCourse(event)">
      <input type="hidden" id="courseId" />
      <div class="form-grid">
        <div class="form-group">
          <label>Course Code *</label>
          <input type="text" id="code" class="form-input" required placeholder="e.g. CSC-251" />
        </div>
        <div class="form-group">
          <label>Course Name *</label>
          <input type="text" id="courseName" class="form-input" required placeholder="Web Technologies" />
        </div>
        <div class="form-group">
          <label>Instructor *</label>
          <input type="text" id="instructor" class="form-input" required placeholder="Dr. Muhammad Habib" />
        </div>
        <div class="form-group">
          <label>Department *</label>
          <select id="courseDept" class="form-input" required>
            <option value="">Select…</option>
            <option value="CS">Computer Science (CS)</option>
            <option value="SE">Software Engineering (SE)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Credits</label>
          <input type="number" id="credits" class="form-input" min="1" max="4" value="3" />
        </div>
        <div class="form-group">
          <label>Semester</label>
          <select id="courseSemester" class="form-input">
            <option>1</option><option>2</option><option>3</option>
            <option selected>4</option><option>5</option><option>6</option>
          </select>
        </div>
        <div class="form-group">
          <label>Max Seats</label>
          <input type="number" id="maxSeats" class="form-input" value="50" min="1" />
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-secondary" onclick="closeModal('addCourseModal')">Cancel</button>
        <button type="submit" class="btn-primary">Save Course</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-overlay" id="deleteModal">
  <div class="modal-box modal-sm">
    <div class="modal-header">
      <h3>Confirm Delete</h3>
      <button class="modal-close" onclick="closeModal('deleteModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body"><p>Delete this course? This cannot be undone.</p></div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeModal('deleteModal')">Cancel</button>
      <button class="btn-danger" onclick="confirmDeleteCourse()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="/js/app.js"></script>
<script src="/js/courses.js"></script>
</body>
</html>
