<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMS — Grades</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <span class="brand-icon"><i class="fas fa-graduation-cap"></i></span>
    <span class="brand-text">UniSMS</span>
  </div>
  <nav class="sidebar-nav">
    <a href="/" class="nav-link"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="/students" class="nav-link"><i class="fas fa-users"></i> Students</a>
    <a href="/courses" class="nav-link"><i class="fas fa-book-open"></i> Courses</a>
    <a href="/grades" class="nav-link active"><i class="fas fa-star"></i> Grades</a>
  </nav>
  <div class="sidebar-footer"><span class="uni-name">PMAS Arid Agriculture University</span></div>
</div>

<div class="main-content">
  <div class="topbar">
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <div class="topbar-title">Grade Management</div>
    <div class="topbar-right">
      <button class="btn-primary" onclick="openModal('addGradeModal')">
        <i class="fas fa-plus"></i> Add Grade
      </button>
    </div>
  </div>

  <div class="page-body">
    <div class="card-panel">
      <div class="panel-header">
        <h3><i class="fas fa-star"></i> Grade Records <span id="gradeCount" class="count-badge">0</span></h3>
      </div>
      <div class="panel-body table-responsive">
        <table class="data-table">
          <thead>
            <tr><th>Student</th><th>Roll No</th><th>Course</th><th>Code</th><th>Marks</th><th>Grade</th><th>Semester</th><th>Remarks</th><th>Actions</th></tr>
          </thead>
          <tbody id="gradesBody">
            <tr><td colspan="9" class="text-center">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Add Grade Modal -->
<div class="modal-overlay" id="addGradeModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="gradeModalTitle">Add Grade Record</h3>
      <button class="modal-close" onclick="closeModal('addGradeModal')"><i class="fas fa-times"></i></button>
    </div>
    <form id="gradeForm" onsubmit="submitGrade(event)">
      <input type="hidden" id="gradeId" />
      <div class="form-grid">
        <div class="form-group">
          <label>Student *</label>
          <select id="gradeStudentId" class="form-input" required>
            <option value="">Select Student…</option>
          </select>
        </div>
        <div class="form-group">
          <label>Course *</label>
          <select id="gradeCourseId" class="form-input" required>
            <option value="">Select Course…</option>
          </select>
        </div>
        <div class="form-group">
          <label>Marks (0–100) *</label>
          <input type="number" id="marks" class="form-input" min="0" max="100" required />
        </div>
        <div class="form-group">
          <label>Semester</label>
          <select id="gradeSemester" class="form-input">
            <option>1</option><option>2</option><option>3</option>
            <option selected>4</option><option>5</option><option>6</option>
          </select>
        </div>
        <div class="form-group">
          <label>Year</label>
          <input type="number" id="gradeYear" class="form-input" value="2026" min="2020" max="2030" />
        </div>
        <div class="form-group">
          <label>Remarks</label>
          <input type="text" id="remarks" class="form-input" placeholder="Optional remarks…" />
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-secondary" onclick="closeModal('addGradeModal')">Cancel</button>
        <button type="submit" class="btn-primary">Save Grade</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-overlay" id="deleteModal">
  <div class="modal-box modal-sm">
    <div class="modal-header">
      <h3>Confirm Delete</h3>
      <button class="modal-close" onclick="closeModal('deleteModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body"><p>Delete this grade record? This cannot be undone.</p></div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeModal('deleteModal')">Cancel</button>
      <button class="btn-danger" onclick="confirmDeleteGrade()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="/js/app.js"></script>
<script src="/js/grades.js"></script>
</body>
</html>
