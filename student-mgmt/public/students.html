<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMS — Students</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <span class="brand-icon"><i class="fas fa-graduation-cap"></i></span>
    <span class="brand-text">UniSMS</span>
  </div>
  <nav class="sidebar-nav">
    <a href="/" class="nav-link"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="/students" class="nav-link active"><i class="fas fa-users"></i> Students</a>
    <a href="/courses" class="nav-link"><i class="fas fa-book-open"></i> Courses</a>
    <a href="/grades" class="nav-link"><i class="fas fa-star"></i> Grades</a>
  </nav>
  <div class="sidebar-footer"><span class="uni-name">PMAS Arid Agriculture University</span></div>
</div>

<div class="main-content">
  <div class="topbar">
    <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <div class="topbar-title">Student Management</div>
    <div class="topbar-right">
      <button class="btn-primary" onclick="openModal('addModal')">
        <i class="fas fa-plus"></i> Add Student
      </button>
    </div>
  </div>

  <div class="page-body">
    <!-- Filters -->
    <div class="filter-bar">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search by name or roll no…" oninput="filterStudents()" />
      </div>
      <select id="deptFilter" class="filter-select" onchange="filterStudents()">
        <option value="">All Departments</option>
        <option value="CS">CS</option>
        <option value="SE">SE</option>
      </select>
      <select id="statusFilter" class="filter-select" onchange="filterStudents()">
        <option value="">All Status</option>
        <option value="Active">Active</option>
        <option value="Inactive">Inactive</option>
      </select>
    </div>

    <!-- Table -->
    <div class="card-panel">
      <div class="panel-header">
        <h3><i class="fas fa-users"></i> All Students <span id="studentCount" class="count-badge">0</span></h3>
      </div>
      <div class="panel-body table-responsive">
        <table class="data-table" id="studentsTable">
          <thead>
            <tr>
              <th>Roll No</th><th>Name</th><th>Email</th>
              <th>Dept</th><th>Semester</th><th>CGPA</th>
              <th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="studentsBody">
            <tr><td colspan="8" class="text-center">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modalTitle">Add New Student</h3>
      <button class="modal-close" onclick="closeModal('addModal')"><i class="fas fa-times"></i></button>
    </div>
    <form id="studentForm" onsubmit="submitStudent(event)">
      <input type="hidden" id="studentId" />
      <div class="form-grid">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="name" class="form-input" required placeholder="e.g. Ayesha Khan" />
        </div>
        <div class="form-group">
          <label>Roll Number *</label>
          <input type="text" id="rollNo" class="form-input" required placeholder="e.g. CS-2101" />
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="email" class="form-input" required placeholder="student@uni.edu" />
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="phone" class="form-input" placeholder="0300-1234567" />
        </div>
        <div class="form-group">
          <label>Department *</label>
          <select id="department" class="form-input" required>
            <option value="">Select…</option>
            <option value="CS">Computer Science (CS)</option>
            <option value="SE">Software Engineering (SE)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Semester *</label>
          <select id="semester" class="form-input" required>
            <option value="">Select…</option>
            <option>1</option><option>2</option><option>3</option>
            <option>4</option><option>5</option><option>6</option>
            <option>7</option><option>8</option>
          </select>
        </div>
        <div class="form-group">
          <label>CGPA</label>
          <input type="number" id="cgpa" class="form-input" step="0.01" min="0" max="4" placeholder="0.00–4.00" />
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="status" class="form-input">
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-secondary" onclick="closeModal('addModal')">Cancel</button>
        <button type="submit" class="btn-primary" id="submitBtn">Add Student</button>
      </div>
    </form>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal-box modal-sm">
    <div class="modal-header">
      <h3>Confirm Delete</h3>
      <button class="modal-close" onclick="closeModal('deleteModal')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <p>Are you sure you want to delete student <strong id="deleteStudentName"></strong>? This action cannot be undone.</p>
    </div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeModal('deleteModal')">Cancel</button>
      <button class="btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/app.js"></script>
<script src="/js/students.js"></script>
</body>
</html>
